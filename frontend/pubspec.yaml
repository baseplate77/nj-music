name: yt_music
description: "A YouTube Music client (Flutter frontend for the ytmusicapi backend)."
publish_to: 'none'
version: 0.1.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dart_ytmusic_api: ^1.3.7
  youtube_explode_dart: ^2.3.9
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.15
  audio_session: ^0.1.23
  permission_handler: ^11.3.1
  live_activities: ^2.4.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  share_plus: ^10.1.1
  file_picker: ^8.1.4
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  palette_generator: ^0.3.3+3
  liquid_glass_renderer: ^0.2.0-dev.4
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
